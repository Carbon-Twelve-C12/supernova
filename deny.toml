# Supernova cargo-deny configuration.
#
# Enforces:
# - Security advisories (vulnerabilities + yanked crates)
# - License allowlist (no copyleft except permissive variants)
# - Supply-chain integrity (registry pinned, no unknown git remotes)
# - Multi-version hygiene (warn on duplicate crate graphs)
#
# Schema follows cargo-deny v0.16+. Older fields (`vulnerability`,
# `unlicensed`, `copyleft`, `allow-osi-fsf-free`, top-level
# `[advisories].unmaintained`, `notice`) were removed and have been
# replaced with the equivalents below.
#
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Walk every feature combination, not just the default ones, so a feature-
# gated dependency (e.g. `s3-backup` pulling in `aws-sdk-s3`) is still
# audited. Without this, conditional deps slip past the license/advisory
# checks until someone enables that feature.
all-features = true
exclude = []

# ============================================================================
# ADVISORIES — security-vulnerability and yanked-crate checks
# ============================================================================
[advisories]
# Latest schema version — required by cargo-deny v0.16+.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Yanked versions in `Cargo.lock` are treated as build failures: a yanked
# release usually means the upstream maintainer pulled it for a reason
# (broken release, embargoed CVE, license issue) and our pinned snapshot
# would inherit that breakage on a clean rebuild.
yanked = "deny"
# Per-advisory exemptions live here. Every entry MUST carry a comment
# explaining the rationale and an expiry/follow-up. Empty by default.
ignore = [
    # Example: { id = "RUSTSEC-2020-0001", reason = "<why>" },
]

# ============================================================================
# LICENSES — allowlist + clarifications for crates with non-trivial license
# expressions (e.g. ring's combined ISC AND MIT AND OpenSSL clause).
# ============================================================================
[licenses]
version = 2
# A crate without a detected license is rejected outright — no implicit
# trust. To grant an exception, add a `[[licenses.clarify]]` entry with
# the canonical SPDX expression and the LICENSE file's content hash.
confidence-threshold = 0.8
# Permissive licenses we accept across the workspace. Adding a license
# here is a security/compliance decision, not a developer convenience.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSL-1.0",
    "OpenSSL",
]

# `ring`'s license expression isn't auto-detectable from the project
# layout. Pin it explicitly so a passing license check actually verifies
# the file content rather than waving it through.
[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ============================================================================
# BANS — duplicate-version policy + crate denylist
# ============================================================================
[bans]
# Multiple major versions of the same crate inflate binary size and
# increase the surface area we'd need to audit if a CVE appears. Warn so
# the duplicates are visible in CI; promote to "deny" once we've cleaned
# the existing offenders.
multiple-versions = "warn"
# Wildcards (`"*"`) are dangerous because they silently pull in any
# upstream major version. We don't use them, but allow until enforced.
wildcards = "allow"
highlight = "all"
# Crates we never want in the dependency graph (typically because we
# replaced them with a hardened equivalent). Empty for now.
deny = [
    # Example: { crate = "openssl", reason = "use rustls instead" },
]
# Specific (crate, version) pairs we tolerate as duplicates. Empty by default.
skip = []
# Whole subtrees we tolerate as duplicates (typically platform shims like
# `windows-sys` whose multiple versions are forced by upstream).
skip-tree = []

# ============================================================================
# SOURCES — registry / git allowlist for supply-chain integrity
# ============================================================================
[sources]
# Crates from a registry we don't recognise are rejected outright.
unknown-registry = "deny"
# Direct-from-git dependencies are flagged loudly. They bypass the crates.io
# yank/audit path and are a common supply-chain weak spot. Switch to "deny"
# once every transitive git dep has been removed or vendored.
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
