# Supernova Testnet — Seed Node 1
#
# Role: long-running peer-list provider. Does not mine. Other nodes discover
# the rest of the testnet by exchanging peer lists with seed nodes.
#
# Schema matches `NodeConfig` in node/src/config.rs (validated via
# `deny_unknown_fields` on the [api] block). For the operator-action items
# (api_keys, bootstrap multiaddr) see the bootstrap-node.toml comments.

[node]
chain_id = "supernova-testnet"
environment = "Testnet"
metrics_enabled = true
metrics_port = 9100
log_level = "info"
network_name = "Seed Node 1"
enable_lightning = true
enable_quantum_security = true
enable_mining = false

[network]
listen_addr = "/ip4/0.0.0.0/tcp/8333"
max_peers = 256
# Replace with the bootstrap node's libp2p multiaddr once the testnet is
# running, e.g.:
#   bootstrap_nodes = ["/ip4/172.20.0.10/tcp/8333/p2p/12D3KooW..."]
# Without a peer-id suffix libp2p will reject the address. The container's
# `BOOTSTRAP_NODES` environment variable can also override this at runtime
# (via `SUPERNOVA_NETWORK_BOOTSTRAP_NODES`).
bootstrap_nodes = []
peer_ping_interval = 30
max_outbound_connections = 32
max_inbound_connections = 200
ban_threshold = 100
ban_duration = 86400
network_id = "supernova-testnet"
enable_mdns = false
enable_upnp = false
enable_peer_exchange = true
enable_nat_traversal = false
connection_timeout = 30
reconnect_interval = 60
status_broadcast_interval = 180
trusted_peers = []
min_outbound_connections = 8

[network.peer_diversity]
enabled = true
min_diversity_score = 0.7
connection_strategy = "BalancedDiversity"
rotation_interval = 21600
max_peers_per_subnet = 20
max_peers_per_asn = 50
max_peers_per_region = 100
max_inbound_ratio = 10.0
max_connection_attempts_per_min = 60

[network.pubsub_config]
history_length = 5
history_gossip = 3
duplicate_cache_size = 1000
duplicate_cache_ttl = 120
heartbeat_interval = 10
validation_mode = "Strict"
max_transmit_size = 5242880
explicit_relays = 3

[storage]
db_path = "/home/supernova/data"
enable_compression = true
cache_size = 1073741824
max_open_files = 1000
block_cache_size = 67108864

[mempool]
max_size = 5000
transaction_timeout = 7200
min_fee_rate = 1.0
max_fee_rate = 100000.0
max_per_address = 100
max_orphan_transactions = 100
enable_rbf = true
min_rbf_fee_increase = 10.0

[backup]
backup_dir = "/home/supernova/data/backups"
max_backups = 5
backup_interval = 3600
enable_automated_backups = true
compress_backups = true
verify_on_startup = true

[checkpoint]
checkpoints_enabled = true
checkpoint_interval = 86400
checkpoint_type = "Full"
data_dir = "/home/supernova/data/checkpoints"
max_checkpoints = 7

[api]
bind_address = "0.0.0.0"
port = 8332
cors_allowed_origins = []
rate_limit = 200
enable_auth = true
api_keys = []
enable_docs = true
detailed_logging = true
max_json_payload_size = 5
request_timeout = 30

[testnet]
enabled = true
network_id = "testnet"
enable_faucet = false
faucet_amount = 10000000000
faucet_cooldown = 3600
faucet_max_balance = 1000000000000
enable_test_mining = false
test_mining_difficulty = 1
enable_network_simulation = false
simulated_latency_ms = 0
simulated_packet_loss = 0.0
