name: Docker Image CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-image.yml'
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-image.yml'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: carbon-twelve-c12/supernova

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # required for cosign keyless signing on tag builds
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3

      - name: Sign pushed image (cosign keyless)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_YES: 'true'
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Sign every tag pushed by metadata-action at the exact digest produced
          # by this build — anchoring to the digest prevents TOCTOU where a tag
          # could be overwritten between push and sign.
          for tag in ${TAGS}; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Update Docker Hub Description
        if: github.event_name != 'pull_request' && contains(github.ref, 'refs/tags/') && success()
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: carbon-twelve-c12/supernova
          short-description: "Supernova Blockchain Node - A production-grade PoW blockchain implementation in Rust"
          readme-filepath: ./docker/README.md
