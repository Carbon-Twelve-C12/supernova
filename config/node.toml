# Supernova Node Configuration

[node]
chain_id = "supernova-testnet"
environment = "Testnet"
metrics_enabled = true
metrics_port = 9000
log_level = "info"
network_name = "Supernova Testnet"
enable_lightning = true
enable_quantum_security = true

[network]
listen_addr = "/ip4/0.0.0.0/tcp/8333"
# max_peers must be >= max_inbound_connections + max_outbound_connections,
# else NodeConfig validation rejects the file on startup. 200 leaves headroom
# above the 128 inbound + 24 outbound caps below so a fully-populated outbound
# side does not force the node to refuse legitimate inbound connections.
max_peers = 200
bootstrap_nodes = []
peer_ping_interval = 30
max_outbound_connections = 24
max_inbound_connections = 128
ban_threshold = 100
ban_duration = 86400
network_id = "supernova-testnet"
enable_mdns = true
enable_upnp = true
enable_peer_exchange = true
enable_nat_traversal = true
connection_timeout = 30
reconnect_interval = 60
status_broadcast_interval = 180
trusted_peers = []
min_outbound_connections = 8

[network.peer_diversity]
enabled = true
min_diversity_score = 0.7
connection_strategy = "BalancedDiversity"
rotation_interval = 21600
max_peers_per_subnet = 3
max_peers_per_asn = 5
max_peers_per_region = 10
max_inbound_ratio = 3.0
max_connection_attempts_per_min = 5

[network.pubsub_config]
history_length = 5
history_gossip = 3
duplicate_cache_size = 1000
duplicate_cache_ttl = 120
heartbeat_interval = 10
validation_mode = "Strict"
max_transmit_size = 5242880
explicit_relays = 3

[storage]
db_path = "./data"
enable_compression = false
cache_size = 536870912
max_open_files = 1000
block_cache_size = 33554432

[mempool]
max_size = 5000
transaction_timeout = 7200
min_fee_rate = 1.0
max_fee_rate = 100000.0  # Maximum fee rate in novas/byte (prevents fee sniping attacks)
max_per_address = 100
max_orphan_transactions = 100
enable_rbf = true
min_rbf_fee_increase = 10.0

[backup]
backup_dir = "./backups"
max_backups = 5
backup_interval = 3600
enable_automated_backups = true
compress_backups = true
verify_on_startup = true

[checkpoint]
checkpoints_enabled = true
checkpoint_interval = 86400
checkpoint_type = "Full"
data_dir = "./checkpoints"
max_checkpoints = 7

[api]
# Field names below match the ApiConfig struct in node/src/api/server.rs.
# The TOML loader silently drops unknown fields, so misnamed entries are NOT
# surfaced at startup — earlier revisions of this file used `authentication_
# required` / `rate_limit_per_minute` / `max_request_size` which all match
# nothing on the struct, and operators got the secure defaults regardless of
# their TOML choices. Keep field names exact.

# Bind address — keep loopback by default. Public exposure requires explicitly
# changing this AND populating api_keys below; binding 0.0.0.0 with absent
# auth is the historical foot-gun the defaults were hardened against.
bind_address = "127.0.0.1"
port = 8332

# Cross-origin policy. Empty list = no browser-origin RPC access (secure
# default). Add specific dashboard / explorer origins here, e.g.
#   cors_allowed_origins = ["https://dashboard.example.org"]
# Wildcard "*" defeats CORS protection — only acceptable for purely-local
# development against a loopback bind_address.
cors_allowed_origins = []

# Rate limit in requests/minute. Omit to disable.
rate_limit = 100

# Authentication. The server REFUSES TO START with enable_auth = true and an
# empty api_keys list — this is intentional (a prior revision shipped a hard-
# coded "CHANGE-ME-IN-PRODUCTION-..." placeholder that operators ignored).
# To bring up the API:
#   1. Run:  supernova-node generate-api-key
#   2. Paste the output into api_keys below.
# Disabling auth (enable_auth = false) is acceptable ONLY for purely-local
# development on a loopback bind_address; do not ship that to a public host.
enable_auth = true
api_keys = []

# OpenAPI / Swagger UI exposure. Disable in production behind a reverse proxy.
enable_docs = true

# Verbose request/response logging. Useful in development; lower in production
# to reduce log volume and avoid surfacing operator queries.
detailed_logging = true

# Maximum JSON payload size in megabytes. 5 MB covers block-template / batch
# transaction submission without exposing the server to memory pressure.
max_json_payload_size = 5

# Per-request timeout in seconds.
request_timeout = 30

[testnet]
enabled = true
network_id = "testnet"
enable_faucet = false
faucet_amount = 1000000000000000000
faucet_cooldown = 60
faucet_max_balance = 1000000000000000000
enable_test_mining = false
test_mining_difficulty = 1
enable_network_simulation = false
simulated_latency_ms = 0
simulated_packet_loss = 0.0 