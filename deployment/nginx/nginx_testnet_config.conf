# Supernova Testnet Nginx Configuration

# Main testnet landing page
server {
    listen 80;
    server_name testnet.supernovanetwork.xyz;
    
    root /var/www/html/testnet/testnet;
    index index.html;
    
    location / {
        try_files $uri $uri/ =404;
    }
}

# API subdomain - Routes to node API
server {
    listen 80;
    server_name api.testnet.supernovanetwork.xyz;
    
    root /var/www/html/testnet/api;
    index index.html;
    
    # Serve documentation at root
    location = / {
        try_files /index.html =404;
    }
    
    # Proxy API requests
    location / {
        # CORS: only echo Origin back if it matches a known testnet subdomain.
        # `$cors_origin` stays empty for unknown origins, which causes the
        # add_header line to emit an empty value that browsers reject — no
        # cross-origin access granted. `always` ensures the header attaches
        # to 4xx / 5xx responses as well, so clients see the CORS decision
        # instead of treating errors as a CORS failure.
        set $cors_origin "";
        if ($http_origin ~* "^https?://((testnet|api\.testnet|faucet\.testnet|explorer\.testnet|status\.testnet|dashboard\.testnet|wallet\.testnet|grafana\.testnet)\.supernovanetwork\.xyz)$") {
            set $cors_origin $http_origin;
        }

        # Preflight: short-circuit OPTIONS with the CORS response and no body.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Vary' 'Origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' '600' always;
            add_header 'Content-Length' '0' always;
            add_header 'Content-Type' 'text/plain charset=UTF-8' always;
            return 204;
        }

        proxy_pass http://localhost:8332/api/v1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Vary' 'Origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    }
}

# Faucet subdomain - Routes to faucet service
server {
    listen 80;
    server_name faucet.testnet.supernovanetwork.xyz;
    
    root /var/www/html/testnet/faucet;
    index index.html;
    
    # API routes for faucet
    location /api/ {
        proxy_pass http://localhost:8332/api/v1/faucet/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location / {
        try_files $uri $uri/ =404;
    }
}

# Explorer subdomain - Routes to block explorer
server {
    listen 80;
    server_name explorer.testnet.supernovanetwork.xyz;
    
    root /var/www/html/testnet/explorer;
    index index.html;
    
    # API routes for explorer
    location /api/ {
        proxy_pass http://localhost:8332/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location / {
        try_files $uri $uri/ =404;
    }
}

# Status subdomain - Routes to status dashboard
server {
    listen 80;
    server_name status.testnet.supernovanetwork.xyz;
    
    root /var/www/html/testnet/status;
    index index.html;
    
    # WebSocket for real-time updates
    location /ws {
        proxy_pass http://localhost:8332/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    location /api/ {
        proxy_pass http://localhost:8332/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location / {
        try_files $uri $uri/ =404;
    }
}

