# Grafana subdomain - Monitoring
server {
    listen 80;
    server_name grafana.testnet.supernovanetwork.xyz;
    
    # Will proxy to Grafana when installed
    location / {
        return 503 "Grafana monitoring coming soon";
        add_header Content-Type text/plain;
    }
} 