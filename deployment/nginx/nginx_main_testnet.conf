# Main testnet.supernovanetwork.xyz configuration
server {
    listen 80;
    server_name testnet.supernovanetwork.xyz;
    
    root /var/www/html/testnet;
    index index.html;
    
    location / {
        try_files $uri $uri/ =404;
    }
    
    # Proxy API requests to the node
    location /api/ {
        # CORS: explicit allow-list of testnet subdomains (see
        # nginx_testnet_config.conf for the full rationale).
        set $cors_origin "";
        if ($http_origin ~* "^https?://((testnet|api\.testnet|faucet\.testnet|explorer\.testnet|status\.testnet|dashboard\.testnet|wallet\.testnet|grafana\.testnet)\.supernovanetwork\.xyz)$") {
            set $cors_origin $http_origin;
        }

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Vary' 'Origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' '600' always;
            add_header 'Content-Length' '0' always;
            add_header 'Content-Type' 'text/plain charset=UTF-8' always;
            return 204;
        }

        proxy_pass http://localhost:8332/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Vary' 'Origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    }
} 